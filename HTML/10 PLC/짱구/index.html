<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>짱구의 방정식 마스터 🖍️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #FFF9C4;
        }

        .jua-font {
            font-family: 'Jua', sans-serif;
        }

        .math-font {
            font-family: 'Times New Roman', serif;
            font-style: italic;
            font-weight: bold;
        }

        .shinnosuke-red {
            background-color: #FF5252;
        }

        .shinnosuke-yellow {
            background-color: #FFEB3B;
        }

        .shinnosuke-green {
            background-color: #4CAF50;
        }

        .crayon-border {
            border: 4px solid #333;
            box-shadow: 8px 8px 0px #333;
        }

        .step-box {
            transition: all 0.2s ease;
            border-left: 4px solid #FF5252;
        }

        /* 비밀번호 필드처럼 보이게 하거나 흐리게 처리 */
        .secret-input {
            -webkit-text-security: disc;
            /* 입력을 점으로 표시 */
            transition: all 0.3s ease;
        }

        .secret-input:focus {
            -webkit-text-security: none;
            /* 입력 중에는 보이게 함 */
        }

        .revealed {
            -webkit-text-security: none !important;
            background-color: #fee2e2 !important;
        }
    </style>
</head>

<body class="min-h-screen py-8 px-4">
    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-10 relative">
            <div class="inline-block bg-white crayon-border p-6 rounded-3xl relative">
                <span class="absolute -top-6 -left-6 text-5xl">🖍️</span>
                <h1 class="text-4xl md:text-5xl jua-font text-gray-800 mb-2">짱구의 방정식 마스터</h1>
                <p class="text-lg text-gray-600 font-bold">"자, $c$를 비밀로 숨겨뒀어! 맞춰보라구!"</p>
            </div>
        </header>

        <section class="bg-white crayon-border rounded-3xl p-6 mb-10 overflow-hidden relative">
            <div class="flex items-center mb-6">
                <div
                    class="w-12 h-12 shinnosuke-red rounded-full flex items-center justify-center mr-3 border-2 border-black">
                    <span class="text-2xl">🎒</span>
                </div>
                <h2 class="text-2xl jua-font text-gray-800">1. 짱구의 일차방정식</h2>
            </div>

            <div class="bg-gray-100 rounded-2xl p-4 mb-6 border-2 border-dashed border-gray-400 text-center">
                <p class="text-xl math-font text-blue-600">ax + b = <span id="linear-c-display"
                        class="bg-yellow-200 px-2 rounded">?</span></p>
                <p class="text-xs text-gray-500 mt-1">입력한 $c$는 비밀이야! 정답을 누르면 공개된다구!</p>
            </div>

            <div class="grid grid-cols-3 gap-3 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 text-center">a</label>
                    <input type="number" id="linear-a" value="2"
                        class="w-full border-4 border-gray-800 rounded-xl p-3 text-center text-xl font-bold outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 text-center">b</label>
                    <input type="number" id="linear-b" value="4"
                        class="w-full border-4 border-gray-800 rounded-xl p-3 text-center text-xl font-bold outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-red-500 mb-1 text-center underline">비밀 c</label>
                    <input type="number" id="linear-c" value="10"
                        class="secret-input w-full border-4 border-red-500 rounded-xl p-3 text-center text-xl font-bold bg-red-50 outline-none"
                        title="입력 후 다른 곳을 클릭하면 숨겨져요!">
                </div>
            </div>

            <div class="mb-6 p-4 bg-blue-50 rounded-2xl border-2 border-blue-200">
                <label class="block text-sm font-bold text-blue-600 mb-2 text-center">🤔 내가 생각한 x의 값은?</label>
                <input type="number" id="linear-guess" placeholder="정답을 써봐!"
                    class="w-full border-4 border-blue-400 rounded-xl p-3 text-center text-xl font-bold outline-none">
            </div>

            <button onclick="solveLinear()"
                class="w-full shinnosuke-red hover:bg-red-600 text-white jua-font text-2xl py-4 rounded-2xl border-4 border-black shadow-[4px_4px_0px_#000] active:translate-y-1 active:shadow-none transition-all">
                액션 빔! c 확인하고 풀기!
            </button>

            <div id="linear-result" class="mt-8 hidden">
                <div class="bg-yellow-50 rounded-2xl p-5 border-4 border-yellow-400">
                    <h3 class="jua-font text-xl text-yellow-800 mb-4 flex items-center">
                        <span class="mr-2">📝</span> 짱구가 알려주는 풀이!
                    </h3>
                    <div id="linear-steps" class="space-y-4 text-gray-700 font-bold"></div>
                </div>
            </div>
        </section>

        <section class="bg-white crayon-border rounded-3xl p-6 mb-10 overflow-hidden relative">
            <div class="flex items-center mb-6">
                <div
                    class="w-12 h-12 shinnosuke-green rounded-full flex items-center justify-center mr-3 border-2 border-black">
                    <span class="text-2xl">⚡</span>
                </div>
                <h2 class="text-2xl jua-font text-gray-800">2. 비밀의 이차방정식</h2>
            </div>

            <div class="bg-gray-100 rounded-2xl p-4 mb-6 border-2 border-dashed border-gray-400 text-center">
                <p class="text-xl math-font text-green-600">ax² + bx + <span id="quad-c-display"
                        class="bg-yellow-200 px-2 rounded">?</span> = 0</p>
                <p class="text-xs text-gray-500 mt-1">$c$를 입력하고 비밀로 한 뒤 문제를 풀어봐!</p>
            </div>

            <div class="grid grid-cols-3 gap-3 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 text-center">a</label>
                    <input type="number" id="quad-a" value="1"
                        class="w-full border-4 border-gray-800 rounded-xl p-3 text-center text-xl font-bold outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 text-center">b</label>
                    <input type="number" id="quad-b" value="-5"
                        class="w-full border-4 border-gray-800 rounded-xl p-3 text-center text-xl font-bold outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-red-500 mb-1 text-center underline">비밀 c</label>
                    <input type="number" id="quad-c" value="6"
                        class="secret-input w-full border-4 border-red-500 rounded-xl p-3 text-center text-xl font-bold bg-red-50 outline-none">
                </div>
            </div>

            <div class="mb-6 p-4 bg-purple-50 rounded-2xl border-2 border-purple-200">
                <label class="block text-sm font-bold text-purple-600 mb-2 text-center">🤔 내가 생각한 한 근(x)은?</label>
                <input type="number" id="quad-guess" placeholder="x를 맞춰봐!"
                    class="w-full border-4 border-purple-400 rounded-xl p-3 text-center text-xl font-bold outline-none">
            </div>

            <button onclick="solveQuadratic()"
                class="w-full shinnosuke-green hover:bg-green-600 text-white jua-font text-2xl py-4 rounded-2xl border-4 border-black shadow-[4px_4px_0px_#000] active:translate-y-1 active:shadow-none transition-all">
                부리부리~ c를 공개하라!
            </button>

            <div id="quad-result" class="mt-8 hidden">
                <div class="bg-green-50 rounded-2xl p-5 border-4 border-green-400">
                    <h3 class="jua-font text-xl text-green-800 mb-4 flex items-center">
                        <span class="mr-2">🍫</span> 비밀 해제! 풀이 과정!
                    </h3>
                    <div id="quad-steps" class="space-y-4 text-gray-700 font-bold"></div>
                </div>
            </div>
        </section>

        <footer class="text-center pb-10">
            <p class="jua-font text-gray-500">© 짱구의 방정식 마스터 - 중3 수학 100점 가즈아!</p>
        </footer>
    </div>

    <script>
        function resetSecret() {
            // 새 문제를 풀 때 다시 비밀로 설정하는 로직 (필요시 호출)
            document.querySelectorAll('.secret-input').forEach(el => el.classList.remove('revealed'));
            document.getElementById('linear-c-display').innerText = '?';
            document.getElementById('quad-c-display').innerText = '?';
        }

        function solveLinear() {
            const a = parseFloat(document.getElementById('linear-a').value);
            const b = parseFloat(document.getElementById('linear-b').value);
            const cInput = document.getElementById('linear-c');
            const c = parseFloat(cInput.value);
            const guess = document.getElementById('linear-guess').value;

            if (isNaN(a) || isNaN(b) || isNaN(c)) return;

            // c값 공개
            cInput.classList.add('revealed');
            document.getElementById('linear-c-display').innerText = c;

            let steps = "";
            let isCorrect = false;

            if (a === 0) {
                steps = (b === c) ? "해는 모든 실수!" : "해는 없음!";
            } else {
                const x = (c - b) / a;
                const resultVal = Number.isInteger(x) ? x : parseFloat(x.toFixed(2));

                if (guess !== "" && Math.abs(parseFloat(guess) - x) < 0.01) {
                    isCorrect = true;
                }

                const feedback = isCorrect
                    ? "<div class='mb-4 p-3 bg-green-500 text-white rounded-xl text-center text-lg animate-bounce'>✨ 우와아! 정답이야! 짱구보다 똑똑한데?</div>"
                    : (guess !== "" ? `<div class='mb-4 p-3 bg-red-400 text-white rounded-xl text-center text-lg'>😅 아깝다! 비밀번호는 ${c}였어!</div>` : "");

                steps += feedback;
                steps += `<div class='p-3 bg-white rounded-xl border-2 border-gray-200 mb-2'>공개된 수식: <span class='text-red-500 font-bold'>${a}x + ${b} = ${c}</span></div>`;
                steps += `<div class='step-box pl-3'>1단계: 이항하기 <span class='text-blue-600'>${a}x = ${c} - ${b}</span></div>`;
                steps += `<div class='step-box pl-3'>2단계: 계산 <span class='text-blue-600'>${a}x = ${c - b}</span></div>`;
                steps += `<div class='mt-4 p-4 bg-red-500 text-white text-center rounded-xl text-2xl jua-font'>진짜 정답: x = ${resultVal}</div>`;
            }

            const container = document.getElementById('linear-steps');
            container.innerHTML = steps;
            container.parentElement.parentElement.classList.remove('hidden');
            container.parentElement.parentElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function solveQuadratic() {
            const a = parseFloat(document.getElementById('quad-a').value);
            const b = parseFloat(document.getElementById('quad-b').value);
            const cInput = document.getElementById('quad-c');
            const c = parseFloat(cInput.value);
            const guess = document.getElementById('quad-guess').value;

            if (isNaN(a) || isNaN(b) || isNaN(c)) return;

            // c값 공개
            cInput.classList.add('revealed');
            document.getElementById('quad-c-display').innerText = c;

            if (a === 0) {
                alert("a가 0이면..... 이차방정식이 아니야!");
                return;
            }

            const D = (b * b) - (4 * a * c);
            let steps = "";

            const x1 = D >= 0 ? (-b + Math.sqrt(D)) / (2 * a) : null;
            const x2 = D >= 0 ? (-b - Math.sqrt(D)) / (2 * a) : null;
            const fmt = (n) => Number.isInteger(n) ? n : n.toFixed(2);

            let isCorrect = false;
            if (guess !== "" && x1 !== null) {
                const gVal = parseFloat(guess);
                if (Math.abs(gVal - x1) < 0.01 || Math.abs(gVal - x2) < 0.01) isCorrect = true;
            }

            const feedback = isCorrect
                ? "<div class='mb-4 p-3 bg-yellow-400 text-black rounded-xl text-center text-lg animate-bounce'>🏆 대단해! 비밀 숫자 ${c}를 뚫고 맞췄어!</div>"
                : (guess !== "" ? `<div class='mb-4 p-3 bg-red-400 text-white rounded-xl text-center text-lg'>💧 아쉬워! 비밀 숫자 c는 ${c}였어!</div>` : "");

            steps += feedback;
            steps += `<div class='p-3 bg-white rounded-xl border-2 border-gray-200 mb-2'>공개된 수식: <span class='text-green-600 font-bold'>${a}x² + (${b})x + ${c} = 0</span></div>`;
            steps += `<div class='step-box pl-3'>판별식 D = ${b}² - 4×${a}×${c} = <span class='text-red-500'>${D}</span></div>`;

            if (D < 0) {
                steps += `<div class='mt-4 p-4 bg-gray-400 text-white text-center rounded-xl text-xl jua-font'>D가 0보다 작아서 해가 없어!</div>`;
            } else if (D === 0) {
                steps += `<div class='mt-4 p-4 bg-green-500 text-white text-center rounded-xl text-2xl jua-font'>중근: x = ${fmt(x1)}</div>`;
            } else {
                steps += `<div class='mt-4 grid grid-cols-2 gap-2'>
                    <div class='p-4 bg-green-500 text-white text-center rounded-xl text-xl jua-font'>x₁ = ${fmt(x1)}</div>
                    <div class='p-4 bg-green-500 text-white text-center rounded-xl text-xl jua-font'>x₂ = ${fmt(x2)}</div>
                </div>`;
            }

            const container = document.getElementById('quad-steps');
            container.innerHTML = steps;
            container.parentElement.parentElement.classList.remove('hidden');
            container.parentElement.parentElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>

</html>
